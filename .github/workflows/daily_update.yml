name: VyaparIQ Daily Update

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        lfs: true
        token: ${{ secrets.GH_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install requests pandas numpy scikit-learn xgboost joblib

    - name: Run update pipeline
      run: |
        python update_pipeline.py

    - name: Push updated files to Hugging Face
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        cd /tmp
        git clone https://Vedantttt31:$HF_TOKEN@huggingface.co/spaces/Vedantttt31/VyaparIQ hf_space
        cp $GITHUB_WORKSPACE/data_clean.csv hf_space/
        cp $GITHUB_WORKSPACE/model_lr.pkl hf_space/
        cp $GITHUB_WORKSPACE/label_encoders.pkl hf_space/
        cd hf_space
        git config user.email "cvedant@iitbhilai.ac.in"
        git config user.name "VyaparIQ Bot"
        git add data_clean.csv model_lr.pkl label_encoders.pkl
        git commit -m "Auto update $(date '+%Y-%m-%d')" || echo "Nothing to commit"
        git push

    - name: Push updated files to GitHub
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        git config user.email "cvedant@iitbhilai.ac.in"
        git config user.name "VyaparIQ Bot"
        git remote set-url origin https://vedantttt31:$GH_TOKEN@github.com/vedantttt31/VyaparIQ.git
        git add data_clean.csv model_lr.pkl label_encoders.pkl
        git commit -m "Auto update $(date '+%Y-%m-%d')" || echo "Nothing to commit"
        git push origin main
